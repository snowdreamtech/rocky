name: Docker Image Testing

on:
  workflow_run:
    workflows: ["Docker Multi-Architecture Build"]
    types: [completed]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        version: [8, 9, 10]
        include:
          - version: 8
            rocky_version: "8.10.0"
          - version: 9
            rocky_version: "9.7.0"
          - version: 10
            rocky_version: "10.1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Test basic functionality
        run: |
          echo "Testing Rocky Linux ${{ matrix.version }} basic functionality..."

          # Basic system test
          docker run --rm snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }} \
            /bin/bash -c "
              echo 'System Information:' && \
              cat /etc/os-release && \
              echo 'Kernel:' && \
              uname -a && \
              echo 'Available packages:' && \
              dnf list installed | head -10
            "

      - name: Test user mapping functionality
        run: |
          echo "Testing user mapping functionality..."

          # Test user creation with PUID/PGID
          docker run --rm \
            -e PUID=1000 \
            -e PGID=1000 \
            -e USER=testuser \
            -e DEBUG=true \
            snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }} \
            /bin/bash -c "
              echo 'User Information:' && \
              id && \
              echo 'Home Directory:' && \
              ls -la /home/ && \
              echo 'User creation test passed'
            "

      - name: Test environment variables
        run: |
          echo "Testing environment variable configuration..."

          # Test various environment configurations
          docker run --rm \
            -e DEBUG=true \
            -e KEEPALIVE=0 \
            -e UMASK=022 \
            -e WORKDIR=/tmp \
            -e TZ=Asia/Shanghai \
            snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }} \
            /bin/bash -c "
              echo 'Environment Variables:' && \
              env | grep -E '(DEBUG|KEEPALIVE|UMASK|WORKDIR|TZ)' && \
              echo 'Working Directory:' && \
              pwd && \
              echo 'Timezone:' && \
              date && \
              echo 'Environment test passed'
            "

      - name: Test entrypoint system
        run: |
          echo "Testing entrypoint system functionality..."

          # Test entrypoint script execution
          docker run --rm \
            -e DEBUG=true \
            snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }} \
            /bin/bash -c "
              echo 'Entrypoint system test:' && \
              ls -la /usr/local/bin/entrypoint.d/ && \
              echo 'gosu availability:' && \
              which gosu && \
              gosu --version && \
              echo 'Entrypoint test passed'
            "

      - name: Test package availability
        run: |
          echo "Testing essential package availability..."

          # Test essential tools
          docker run --rm snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }} \
            /bin/bash -c "
              echo 'Testing essential tools:' && \
              which git && git --version && \
              which curl && curl --version | head -1 && \
              which vim && vim --version | head -1 && \
              which wget && wget --version | head -1 && \
              which jq && jq --version && \
              echo 'Package availability test passed'
            "

  security-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        version: [8, 9, 10]
        include:
          - version: 8
            rocky_version: "8.10.0"
          - version: 9
            rocky_version: "9.7.0"
          - version: 10
            rocky_version: "10.1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }}
          format: sarif
          output: trivy-results-${{ matrix.version }}.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.version }}.sarif
          category: trivy-rocky-${{ matrix.version }}

      - name: Run Trivy vulnerability scanner (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: snowdreamtech/rocky:${{ matrix.version }}-v${{ matrix.rocky_version }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
